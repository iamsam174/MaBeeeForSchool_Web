<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaBeee for School_Control_Eye</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        .draggable { touch-action: none; user-select: none; }
        
        /* 視線入力ONの時に連動する疑似視線ポインタ（赤い丸） */
        #gaze-dot {
            position: fixed;
            width: 24px;
            height: 24px;
            background-color: rgba(239, 68, 68, 0.7);
            border: 3px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            display: none;
        }
        
        /* 実行画面の［マビーON］ボタンの中に外付けカメラ映像を綺麗にフィットさせる設定 */
        .target-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            border-radius: 20px;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen select-none overflow-hidden">

    <div id="gaze-dot"></div>

    <div id="screen-launcher" class="w-full min-h-screen flex flex-col p-6">
        <header class="w-full mb-4 flex justify-between items-center border-b border-slate-700 pb-4">
            <h1 class="text-2xl font-bold tracking-wider text-teal-400 flex items-center gap-2">
                <span>🔋</span> MaBeee for School_Control_Eye
            </h1>
            <div id="launcher-status" class="px-4 py-1.5 rounded-full text-sm font-bold bg-rose-500/20 text-rose-400 border border-rose-500/30 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span> 未接続
            </div>
        </header>

        <div class="flex-1 grid grid-cols-12 gap-6 items-stretch w-full overflow-hidden">
            
            <div class="col-span-7 bg-slate-800/50 p-6 rounded-2xl border border-slate-700 flex flex-col justify-between gap-4 overflow-y-auto">
                
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
                    <h2 class="text-sm font-bold text-slate-400 mb-2">［機器接続］</h2>
                    <button id="btn-connect" class="w-full bg-teal-500 hover:bg-teal-400 text-slate-900 font-bold py-3 rounded-lg transition-all active:scale-95 shadow-lg">
                        MaBeee for Schoolに接続する
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
                        <h2 class="text-sm font-bold text-slate-400 mb-2">［視線入力用カメラ］</h2>
                        <button id="btn-in-camera" class="w-full bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold py-2.5 rounded-lg transition-all text-sm">
                            インカメラ（顔）を起動
                        </button>
                    </div>
                    <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
                        <h2 class="text-sm font-bold text-slate-400 mb-2">［対象物を映すための外付けWebカメラ］</h2>
                        <button id="btn-out-camera" class="w-full bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold py-2.5 rounded-lg transition-all text-xs">
                            外付けWebカメラ（乾電池式のオモチャなど）を起動
                        </button>
                    </div>
                </div>

                <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
                    <h2 class="text-sm font-bold text-slate-400 mb-2">［動作モードの選択］ <span class="text-xs text-slate-500">（キーボード［1］［2］［3］でも切替可能）</span></h2>
                    <div class="grid grid-cols-1 gap-2">
                        <button id="mode-btn-1" class="mode-select-btn text-left border-2 border-teal-500 bg-teal-500/10 text-teal-400 font-bold py-2 px-4 rounded-xl text-sm transition-all">
                            ① クリック/タップ/注視でタイマー実行
                        </button>
                        <button id="mode-btn-2" class="mode-select-btn text-left border border-slate-700 bg-slate-800 text-slate-400 font-bold py-2 px-4 rounded-xl text-sm transition-all">
                            ② マウスオーバーでタイマー実行
                        </button>
                        <button id="mode-btn-3" class="mode-select-btn text-left border border-slate-700 bg-slate-800 text-slate-400 font-bold py-2 px-4 rounded-xl text-sm transition-all">
                            ③ マウスポインタがボタン内にある間マビーON
                        </button>
                    </div>
                </div>

                <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
                    <div class="flex justify-between items-center mb-1">
                        <h2 class="text-sm font-bold text-slate-400">［タイマー秒数設定］ <span class="text-xs text-slate-500">（キーボード［←］［→］で1秒ずつ微調整）</span></h2>
                        <span id="timer-val" class="text-xl font-mono font-bold text-amber-400">5 秒</span>
                    </div>
                    <input id="slider-timer" type="range" min="1" max="180" step="1" value="5" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-teal-500
