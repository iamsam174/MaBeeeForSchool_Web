<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaBeee for School_Control_Eye</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        .draggable { touch-action: none; user-select: none; }
        
        /* 視線入力ONの時に連動する疑似視線ポインタ（赤い丸） */
        #gaze-dot {
            position: fixed;
            width: 24px;
            height: 24px;
            background-color: rgba(239, 68, 68, 0.7);
            border: 3px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            display: none;
        }
        
        /* 実行画面の［マビーON］ボタンの中に外付けカメラ映像を綺麗にフィットさせる設定 */
        .target-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            border-radius: 20px;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen select-none overflow-hidden">

    <div id="gaze-dot"></div>

    <div id="screen-launcher" class="w-full min-h-screen flex flex-col p-6">
        <header class="w-full mb-4 flex justify-between items-center border-b border-slate-700 pb-4">
            <h1 class="text-2xl font-bold tracking-wider text-teal-400 flex items-center gap-2">
                <span>🔋</span> MaBeee for School_Control_Eye
            </h1>
            <div id="launcher-status" class="px-4 py-1.5 rounded-full text-sm font-bold bg-rose-500/20 text-rose-400 border border-rose-500/30 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span> 未接続
            </div>
        </header>

        <div class="flex-1 grid grid-cols-12 gap-6 items-stretch w-full overflow-hidden">
            
            <div class="col-span-7 bg-slate-800/50 p-6 rounded-2xl border border-slate-700 flex flex-col justify-between gap-4 overflow-y-auto">
                
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
                    <h2 class="text-sm font-bold text-slate-400 mb-2">［機器接続］</h2>
                    <button id="btn-connect" class="w-full bg-teal-500 hover:bg-teal-400 text-slate-900 font-bold py-3 rounded-lg transition-all active:scale-95 shadow-lg">

                        <select id="select-in-camera" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-1.5 text-slate-200 text-xs focus:outline-none focus:border-teal-500">

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
                        <h2 class="text-sm font-bold text-slate-400 mb-1">［ボタンサイズ切替］</h2>
                        <select id="select-size" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-slate-200 focus:outline-none text-sm">

                    <div id="placeholder-out" class="text-center text-slate-500 p-2 z-10">
                        <span class="text-2xl block mb-1">📹</span>
                        <p class="text-xs">［外付けWebカメラ］起動時に乾電池式オモチャなどが表示されます<br>（ボタンの背景になります）</p>
                    </div>
                </div>

                <button id="btn-start" class="w-full bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-400 hover:to-emerald-400 text-slate-950 text-xl font-black py-4 rounded-xl transition-all shadow-xl active:scale-[0.98] shrink-0">
                    🚀 スタート（実行画面へ）
                </button>

        </div>

    <div id="screen-run" class="fixed inset-0 min-h-screen hidden bg-slate-950">
        
        <div id="mabeee-target" class="draggable absolute bg-slate-800 border-4 border-slate-700 hover:border-teal-400 rounded-3xl flex flex-col justify-center items-center p-6 cursor-move shadow-2xl transition-colors duration-150 select-none overflow-hidden">
            <video id="run-webcam" class="target-video hidden" autoplay playsinline muted></video>
            
            <span id="target-icon" class="pointer-events-none text-6xl mb-4 z-10 drop-shadow-[0_4px_6px_rgba(0,0,0,0.8)]">🤖</span>
            <span id="target-text" class="pointer-events-none text-3xl font-black tracking-widest text-slate-200 z-10 drop-shadow-[0_4px_6px_rgba(0,0,0,0.8)]">マビーON</span>
        </div>

        <div class="absolute bottom-6 left-6 z-50">
            <button id="btn-gaze-toggle" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-5 py-3 rounded-xl shadow-lg border border-emerald-500/30 flex items-center gap-2 transition-all active:scale-95 text-base">
                <span id="gaze-status-icon">👁️</span> 視線入力: ON <kbd class="bg-emerald-800 px-1.5 py-0.5 rounded text-xs ml-1 font-mono">X</kbd>
            </button>
        </div>

        <div class="absolute bottom-6 right-6 z-50">
            <button id="btn-back" class="bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white font-bold px-6 py-3 rounded-xl shadow-lg border border-slate-700 transition-all active:scale-95 text-base">
                ↩ 設定に戻る
            </button>
        </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(type) {
            const selectSound = document.getElementById('select-sound').value;
            if (selectSound === 'sound-none') return;
            
            if (type === 'start') {
                if (selectSound === 'sound-a') {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                } else if (selectSound === 'sound-b') {
                    [440, 554, 659, 880].forEach((freq, idx) => {
                        let osc = audioCtx.createOscillator();
                        let gain = audioCtx.createGain();
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.15, audioCtx.currentTime + idx * 0.08);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + idx * 0.08 + 0.2);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(audioCtx.currentTime + idx * 0.08);
                        osc.stop(audioCtx.currentTime + idx * 0.08 + 0.2);
                    });
                }
            } else if (type === 'stop') {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            }
        }
    </script>

    <script>
        let appMode = 1; 
        let timerSeconds = 5;
        let isGazeEnabled = true;
        let isOutputActive = false;
        let outputTimeout = null;
        let countdownInterval = null;
        
        let streamIn = null;
        let streamOut = null;
        
        const MABEEE_SERVICE_UUID = '0000aaa0-0000-1000-8000-00805f9b34fb';
        const MABEEE_CHAR_UUID    = '0000aaa1-0000-1000-8000-00805f9b34fb';
        let mabeeeCharacteristic = null;

        const scrLauncher = document.getElementById('screen-launcher');
        const scrRun = document.getElementById('screen-run');
        const sliderTimer = document.getElementById('slider-timer');
        const timerVal = document.getElementById('timer-val');
        const selectSize = document.getElementById('select-size');
        
        const videoIn = document.getElementById('webcam-in');
        const videoOut = document.getElementById('webcam-out');
        const videoRun = document.getElementById('run-webcam');
        
        const placeholderIn = document.getElementById('placeholder-in');
        const placeholderOut = document.getElementById('placeholder-out');
        
        const selectInCam = document.getElementById('select-in-camera');
        const selectOutCam = document.getElementById('select-out-camera');

        const mabeeeTarget = document.getElementById('mabeee-target');
        const targetText = document.getElementById('target-text');
        const targetIcon = document.getElementById('target-icon');
        const btnGazeToggle = document.getElementById('btn-gaze-toggle');

        // --- 【新規実装】PCに繋がっている全カメラを検知してセレクトボックスに格納する処理 ---
        async function initCameraSelect() {
            try {
                // 初回のダミーアクセス（これを行うことでカメラの具体的な製品名（ラベル）がブラウザから取得可能になります）
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
                tempStream.getTracks().forEach(track => track.stop()); // 用が済んだら即停止

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                selectInCam.innerHTML = '';
                selectOutCam.innerHTML = '';

                if (videoDevices.length === 0) {
                    const opt = document.createElement('option');
                    opt.text = 'カメラが見つかりません';
                    selectInCam.appendChild(opt.cloneNode(true));
                    selectOutCam.appendChild(opt.cloneNode(true));
                    return;
                }

                videoDevices.forEach((device, index) => {
                    const label = device.label || `カメラ ${index + 1}`;
                    const opt = document.createElement('option');
                    opt.value = device.deviceId;
                    opt.text = label;

                    // インカメラ用リストに追加
                    selectInCam.appendChild(opt.cloneNode(true));
                    // 外付けカメラ用リストに追加
                    selectOutCam.appendChild(opt.cloneNode(true));
                });

                // 初期状態の選択割り当て（2つ以上あれば、インカメラには1番目、外付けには2番目をデフォルト選択）
                if (videoDevices.length > 1) {
                    selectOutCam.selectedIndex = 1;
                }
            } catch (err) {
                console.error("カメラリスト取得失敗:", err);
            }
        }

        // アプリ起動時にカメラ一覧を即時読み込み
        window.addEventListener('DOMContentLoaded', initCameraSelect);


        function updateTimerDisplay(value) {
            timerSeconds = parseInt(value, 10);
            timerVal.textContent = timerSeconds + ' 秒';
            sliderTimer.value = timerSeconds;
        }
        sliderTimer.addEventListener('input', (e) => updateTimerDisplay(e.target.value));

        function setMode(modeNum) {
            appMode = modeNum;
            document.querySelectorAll('.mode-select-btn').forEach((btn, idx) => {
                if (idx + 1 === modeNum) {
                    btn.className = "mode-select-btn text-left border-2 border-teal-500 bg-teal-500/10 text-teal-400 font-bold py-2.5 px-4 rounded-xl text-sm transition-all";
                } else {
                    btn.className = "mode-select-btn text-left border border-slate-700 bg-slate-800 text-slate-400 font-bold py-2.5 px-4 rounded-xl text-sm transition-all";
                }
            });
        }
        document.getElementById('mode-btn-1').addEventListener('click', () => setMode(1));
        document.getElementById('mode-btn-2').addEventListener('click', () => setMode(2));
        document.getElementById('mode-btn-3').addEventListener('click', () => setMode(3));

        window.addEventListener('keydown', (e) => {
            if (e.key === '1') setMode(1);
            if (e.key === '2') setMode(2);
            if (e.key === '3') setMode(3);
            
            if (e.key === 'ArrowLeft') {
                let newVal = Math.max(1, timerSeconds - 1);
                updateTimerDisplay(newVal);
            }
            if (e.key === 'ArrowRight') {
                let newVal = Math.min(180, timerSeconds + 1);
                updateTimerDisplay(newVal);
            }
            if (e.key.toLowerCase() === 'x' && !scrRun.classList.contains('hidden')) {
                toggleGazeInput();
            }
        });

        // Bluetooth接続
        document.getElementById('btn-connect').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'MaBeee' }],
                    optionalServices: [MABEEE_SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(MABEEE_SERVICE_UUID);
                mabeeeCharacteristic = await service.getCharacteristic(MABEEE_CHAR_UUID);
                
                document.getElementById('launcher-status').innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span> 接続中`;
                document.getElementById('launcher-status').className = "px-4 py-1.5 rounded-full text-sm font-bold bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 flex items-center gap-2";
                document.getElementById('btn-connect').textContent = "接続完了";
                document.getElementById('btn-connect').classList.replace('bg-teal-500', 'bg-emerald-600');
            } catch (err) {
                console.warn("Bluetooth接続失敗", err);
            }
        });

        // 1) 視線入力用カメラ（選択されたIDで確実に起動）
        document.getElementById('btn-in-camera').addEventListener('click', async () => {
            try {
                if (streamIn) { streamIn.getTracks().forEach(track => track.stop()); } // 起動中の場合は一度停止
                
                const selectedId = selectInCam.value;
                const constraints = { video: selectedId ? { deviceId: { exact: selectedId } } : { facingMode: "user" } };

                streamIn = await navigator.mediaDevices.getUserMedia(constraints);
                videoIn.srcObject = streamIn;
                placeholderIn.classList.add('hidden');
                document.getElementById('btn-in-camera').textContent = "インカメラ起動中";
                document.getElementById('btn-in-camera').classList.replace('bg-slate-700', 'bg-emerald-600');
            } catch (err) {
                alert("インカメラの起動に失敗しました。選択したカメラを変更してみてください。");
            }
        });

        // 2) 対象物用カメラ（選択されたIDで確実に起動、実行画面へ反映）
        document.getElementById('btn-out-camera').addEventListener('click', async () => {
            try {
                if (streamOut) { streamOut.getTracks().forEach(track => track.stop()); } // 起動中の場合は一度停止
                
                const selectedId = selectOutCam.value;
                const constraints = { video: selectedId ? { deviceId: { exact: selectedId } } : { facingMode: "environment" } };

                streamOut = await navigator.mediaDevices.getUserMedia(constraints);
                videoOut.srcObject = streamOut;
                
                videoRun.srcObject = streamOut; 
                videoRun.
